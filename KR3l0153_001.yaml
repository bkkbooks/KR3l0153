body:
  text: 郭季産集異記兗州人船行忽見水上有浮鎖牽取得數許丈乃得一白牛與常牛無異而形甚光鮮可愛知是神物乃放之牛於是入水鎖亦隨去御覽九百吳郡吳泰能筮會稽盧氏失博山香爐使泰筮之泰曰此物質雖為金其象實山有樹非林有孔非泉閶闔興風時發青煙乃香爐也語其主處求即得之矣書鈔一百三十五類聚七十御覽七百三陽平宋謹善解夢有孫氏求官睡得夢雙鳳集其兩拳以問謹謹曰鳳皇非梧桐不棲非竹實不食卿當大凶非苴杖即削杖也後孫氏果遭母喪御覽四百廣記二百七十六張天錫在涼州夢一緑色狗形甚長從地東南來欲齧張張床上避之乃墮地後符堅遣苟長往破張著緑地錦袍從東南門入皆如夢焉並同上宋中山劉玄居越城日暮忽見一人著烏褲褶來取火照之面首無七孔面莽儻然乃請師筮之師曰此是君家先世物久則為魅殺人及其未有眼目可早除之已上十二字依廣記引補劉因執縛刀斫數下變為一枕乃是其先祖時枕也御覽七百七廣記三百六十八廣平游先期妄見一人著赤褲褶知是魅乃以刀斫之乃死良久方變是所常著屐也御覽六百九十八廣記三百六十八丹陽張承先家有鬼長為其主取物會有客須蓴二斗鱧魚二十頭鬼將一小兒持籃至驃騎街十字路令小兒睡覺看籃中已有蓴鱧御覽七百六十四又九百八十丹陽張承先家有一鬼為張偷得一箭筒語之慎勿至新亭射此三井陶家物張以借他鬼罵欲燒物張馳取還乃止書鈔一百二十六御覽三百五十劉登往經墳冢邊曰我偶餅徐即為辦置林間有十餘鬼皆焦頭來摸餅書鈔一百四十四廣陵士甲市得一宅但聞中有搖鈴聲晝輒止後遂見其真形乃是其故人問曰何以常搖鈴答曰我典使君藥物故夜持時耳問曰晝日何以不持時曰白日是使道之夜因別而去御覽三百三十八會稽照誕入海採菜于山上暴之夜忽見群鬼張目切齒欲來擊誕誕奮刀砍之見鬼悉披靡乃就誕乞少紫菜誕不為與御覽九百八十
